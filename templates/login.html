<!DOCTYPE html>
<html>
<head>
  <title>Login - AI Travel Planner</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f8fafc;
    }

    .login-card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #2563eb;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #cbd5f5;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #1d4ed8;
    }

    .link {
      margin-top: 10px;
      font-size: 14px;
      color: #64748b;
      cursor: pointer;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="login-card">
  <h2>🌍 Login</h2>

  <!-- ✅ IMPORTANT: FORM -->
  <form method="POST" action="/login">
    <input type="text" name="username" placeholder="👤 Username" required>
    <input type="password" name="password" placeholder="🔒 Password" required>

    <button type="submit">Login</button>
  </form>

  <!-- Guest Option -->
  <div class="link" onclick="window.location.href='/home'">
    Continue as Guest
  </div>
</div>

</body>
</html>
